name: Build Desktop Packages

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: "Upload as artifact (for testing without a tag)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    uses: Chao-hu-Lab/shared-workflows/.github/workflows/python-build.yml@main
    with:
      upload_artifact: ${{ inputs.upload_artifact || false }}
      spec-file: "ms_feature_db_matcher.spec"
      executable-name: "MS Feature DB Matcher"
      artifact-prefix: "MS-Feature-DB-Matcher"
      extra-package-files: '[{"src":"README.md","dst":"README.md"}]'
